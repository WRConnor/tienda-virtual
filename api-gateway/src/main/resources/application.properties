spring.cloud.gateway.routes[3].predicates[0]=Path=/api/proveedores/**

spring.cloud.gateway.routes[4].id=venta-service
spring.cloud.gateway.routes[4].uri=lb://venta-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/ventas/**

spring.cloud.gateway.routes[5].id=detalle-venta-service
spring.cloud.gateway.routes[5].uri=lb://detalle-venta-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/detalles-venta/**

